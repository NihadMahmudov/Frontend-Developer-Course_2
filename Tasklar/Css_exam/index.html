<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flowdash</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" aria-label="Menu">☰</button>
      <div class="brand">
        <span class="brand-icon">⤧</span>
        <span class="brand-text">flowdash</span>
      </div>
    </div>

    <div class="topbar-center">
      <div class="search">
        <span class="search-ico">🔍</span>
        <input type="text" placeholder="Search" />
      </div>
    </div>

    <div class="topbar-right">
      <button class="icon-btn" aria-label="Notifications">
        🔔 <span class="notif-dot"></span>
      </button>
      <div class="user">
        <span class="user-name">Adrian D.</span>
        <img class="avatar" src="https://i.pravatar.cc/40?img=12" alt="User" />
      </div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">Menu</div>
    <nav class="nav">
      <a class="nav-item active" href="#">
        <span class="nav-left"><span class="nav-ico">▦</span><span class="nav-label">Dashboards</span></span>
        <span class="nav-pill">+</span>
      </a>
      <a class="nav-item" href="#">
        <span class="nav-left"><span class="nav-ico">▶</span><span class="nav-label">Apps</span></span>
        <span class="nav-pill">+</span>
      </a>
      <a class="nav-item" href="#">
        <span class="nav-left"><span class="nav-ico">📄</span><span class="nav-label">Pages</span></span>
        <span class="nav-pill">+</span>
      </a>
      <a class="nav-item" href="#">
        <span class="nav-left"><span class="nav-ico">▤</span><span class="nav-label">Layouts</span></span>
        <span class="nav-pill">+</span>
      </a>
    </nav>

    <div class="sidebar-section">Components</div>
    <nav class="nav">
      <a class="nav-item" href="#"><span class="nav-left"><span class="nav-ico">■</span><span class="nav-label">Buttons</span></span></a>
      <a class="nav-item" href="#"><span class="nav-left"><span class="nav-ico">!</span><span class="nav-label">Alerts</span></span></a>
      <a class="nav-item" href="#">
        <span class="nav-left"><span class="nav-ico">🙂</span><span class="nav-label">Avatars</span></span>
        <span class="nav-pill">NEW</span>
      </a>
      <a class="nav-item" href="#">
        <span class="nav-left"><span class="nav-ico">📊</span><span class="nav-label">Charts</span></span>
        <span class="nav-pill">PRO</span>
      </a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <section class="dashboard-grid">
      <!-- 1-ci sıra -->
      <div class="card card--sm"></div>
      <div class="card card--sm"></div>
      <div class="card card--sm"></div>

      <!-- 2-ci sıra -->
      <div class="card card--wide"></div>
      <div class="card card--tall"></div>

      <!-- 3-cü sıra -->
      <div class="card card--sm"></div>
      <div class="card card--sm"></div>
      <div class="card card--sm"></div>
    </section>
  </main>

</body>
</html>
